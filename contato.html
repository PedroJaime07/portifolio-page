      <main>
        <section class="descricao">
          <div id="contato">
            <h2>Contatos</h2>
            <ul class="contato">
              <li>
                <a target="_blank" rel="noopener" href="https://wa.me/+5588998057255"

                    class="wpp"

                /></a>
              </li>
              <li>
                <a target="_blank" rel="noopener" href="https://github.com/PedroJaime07"

      <div class="formulario">
        <h2>Formulário de Contato</h2>
        <form class="form-contato" novalidate>
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" />
          <span class="erro" id="erro-nome"></span>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" />
          <span class="erro" id="erro-email"></span>

          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="5"></textarea>
          <span class="erro" id="erro-mensagem"></span>

          <button type="submit">Enviar</button>
        </form>
